<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="schedBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="schedGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes minuteHand {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes hourHand {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(30deg); }
    }
    @keyframes tickPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    .minute {
      transform-origin: 32px 32px;
      animation: minuteHand 8s linear infinite;
    }
    .hour {
      transform-origin: 32px 32px;
      animation: hourHand 8s linear infinite;
    }
    .tick-pulse {
      animation: tickPulse 2s ease-in-out infinite;
    }
    .tick-pulse-2 {
      animation: tickPulse 2s ease-in-out infinite;
      animation-delay: -0.5s;
    }
    .tick-pulse-3 {
      animation: tickPulse 2s ease-in-out infinite;
      animation-delay: -1s;
    }
    .tick-pulse-4 {
      animation: tickPulse 2s ease-in-out infinite;
      animation-delay: -1.5s;
    }
  </style>

  <rect width="64" height="64" rx="12" fill="url(#schedBg)"/>

  <!-- Clock face -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#334155" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.3"/>

  <!-- Hour marks -->
  <g>
    <line class="tick-pulse" x1="32" y1="14" x2="32" y2="17" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
    <line class="tick-pulse-2" x1="50" y1="32" x2="47" y2="32" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
    <line class="tick-pulse-3" x1="32" y1="50" x2="32" y2="47" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
    <line class="tick-pulse-4" x1="14" y1="32" x2="17" y2="32" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Minor marks -->
  <g opacity="0.2">
    <line x1="41" y1="15" x2="40" y2="17.5" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
    <line x1="48" y1="23" x2="46" y2="24.5" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
    <line x1="48" y1="41" x2="46" y2="39.5" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
    <line x1="41" y1="49" x2="40" y2="46.5" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
    <line x1="23" y1="49" x2="24" y2="46.5" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
    <line x1="16" y1="41" x2="18" y2="39.5" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
    <line x1="16" y1="23" x2="18" y2="24.5" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
    <line x1="23" y1="15" x2="24" y2="17.5" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Hour hand -->
  <g class="hour" filter="url(#schedGlow)">
    <line x1="32" y1="32" x2="32" y2="22" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Minute hand -->
  <g class="minute" filter="url(#schedGlow)">
    <line x1="32" y1="32" x2="32" y2="17" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="2" fill="#f59e0b"/>
</svg>