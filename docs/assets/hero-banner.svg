<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#34d399;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes flowRight {
      0% { transform: translateX(-200px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(1100px); opacity: 0; }
    }
    @keyframes flowLeft {
      0% { transform: translateX(200px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(-1100px); opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes subtlePulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes dashFlow {
      0% { stroke-dashoffset: 40; }
      100% { stroke-dashoffset: 0; }
    }
    .stream-cyan {
      animation: flowRight 4s linear infinite;
    }
    .stream-cyan-2 {
      animation: flowRight 4s linear infinite;
      animation-delay: -1.3s;
    }
    .stream-cyan-3 {
      animation: flowRight 4s linear infinite;
      animation-delay: -2.6s;
    }
    .stream-violet {
      animation: flowLeft 5s linear infinite;
    }
    .stream-violet-2 {
      animation: flowLeft 5s linear infinite;
      animation-delay: -1.7s;
    }
    .stream-violet-3 {
      animation: flowLeft 5s linear infinite;
      animation-delay: -3.3s;
    }
    .stream-emerald {
      animation: flowRight 6s linear infinite;
      animation-delay: -2s;
    }
    .pulse-dot {
      animation: pulse 2s ease-in-out infinite;
    }
    .pulse-dot-2 {
      animation: pulse 2s ease-in-out infinite;
      animation-delay: -0.7s;
    }
    .pulse-dot-3 {
      animation: pulse 2s ease-in-out infinite;
      animation-delay: -1.4s;
    }
    .title-pulse {
      animation: subtlePulse 3s ease-in-out infinite;
    }
    .grid-line {
      animation: dashFlow 2s linear infinite;
    }
  </style>

  <!-- Background -->
  <rect width="900" height="280" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.06">
    <line x1="0" y1="70" x2="900" y2="70" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="900" y2="140" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="900" y2="210" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="280" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="280" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="280" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="280" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="280" stroke="#94a3b8" stroke-width="0.5"/>
  </g>

  <!-- Throughput wave background (static sine waves) -->
  <g opacity="0.08">
    <path d="M0,140 Q75,100 150,140 Q225,180 300,140 Q375,100 450,140 Q525,180 600,140 Q675,100 750,140 Q825,180 900,140" fill="none" stroke="#f59e0b" stroke-width="1"/>
    <path d="M0,150 Q75,120 150,150 Q225,180 300,150 Q375,120 450,150 Q525,180 600,150 Q675,120 750,150 Q825,180 900,150" fill="none" stroke="#a78bfa" stroke-width="1"/>
  </g>

  <!-- Flowing data stream lines - Download (amber, left to right) -->
  <g filter="url(#glow)">
    <rect class="stream-cyan" x="0" y="85" width="120" height="2" rx="1" fill="url(#amberGrad)"/>
    <rect class="stream-cyan-2" x="0" y="95" width="80" height="1.5" rx="1" fill="url(#amberGrad)" opacity="0.7"/>
    <rect class="stream-cyan-3" x="0" y="90" width="100" height="1" rx="1" fill="url(#amberGrad)" opacity="0.5"/>
  </g>

  <!-- Flowing data stream lines - Upload (violet, right to left) -->
  <g filter="url(#glow)">
    <rect class="stream-violet" x="780" y="185" width="120" height="2" rx="1" fill="url(#violetGrad)"/>
    <rect class="stream-violet-2" x="780" y="195" width="80" height="1.5" rx="1" fill="url(#violetGrad)" opacity="0.7"/>
    <rect class="stream-violet-3" x="780" y="190" width="100" height="1" rx="1" fill="url(#violetGrad)" opacity="0.5"/>
  </g>

  <!-- Flowing data stream - Stats (emerald) -->
  <g filter="url(#glow)">
    <rect class="stream-emerald" x="0" y="218" width="60" height="1" rx="1" fill="url(#emeraldGrad)" opacity="0.4"/>
  </g>

  <!-- Pulsing nodes -->
  <g filter="url(#glow)">
    <circle class="pulse-dot" cx="80" cy="90" r="3" fill="#f59e0b"/>
    <circle class="pulse-dot-2" cx="820" cy="190" r="3" fill="#a78bfa"/>
    <circle class="pulse-dot-3" cx="450" cy="218" r="2" fill="#34d399"/>
  </g>

  <!-- Side decorative elements -->
  <g opacity="0.15">
    <!-- Left bracket -->
    <path d="M30,100 L20,100 L20,180 L30,180" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <!-- Right bracket -->
    <path d="M870,100 L880,100 L880,180 L870,180" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  </g>

  <!-- Speed indicators on left -->
  <g opacity="0.3" transform="translate(45, 105)">
    <text font-family="monospace" font-size="8" fill="#f59e0b">DL 4.8 Gbps</text>
  </g>
  <g opacity="0.3" transform="translate(45, 180)">
    <text font-family="monospace" font-size="8" fill="#a78bfa">UL 2.1 Gbps</text>
  </g>

  <!-- Speed indicators on right -->
  <g opacity="0.25" transform="translate(790, 105)">
    <text font-family="monospace" font-size="8" fill="#f59e0b" text-anchor="start">22 servers</text>
  </g>
  <g opacity="0.25" transform="translate(790, 180)">
    <text font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="start">B2 / HTTP</text>
  </g>

  <!-- Main title -->
  <g class="title-pulse" filter="url(#glowStrong)">
    <text x="450" y="130" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="800" fill="url(#titleGrad)" letter-spacing="-1">FloodTest</text>
  </g>

  <!-- Subtitle -->
  <text x="450" y="160" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#94a3b8" letter-spacing="4" font-weight="300">WAN THROUGHPUT TESTING</text>

  <!-- Tagline -->
  <text x="450" y="240" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" letter-spacing="1">Detect ISP throttling. Saturate your WAN. Know the truth.</text>

  <!-- Bottom accent line -->
  <rect x="300" y="255" width="300" height="1" rx="0.5" fill="url(#titleGrad)" opacity="0.3"/>

  <!-- Corner accents -->
  <path d="M12,20 L12,12 L20,12" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.3"/>
  <path d="M888,20 L888,12 L880,12" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
  <path d="M12,260 L12,268 L20,268" fill="none" stroke="#34d399" stroke-width="1" opacity="0.3"/>
  <path d="M888,260 L888,268 L880,268" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>
</svg>